set timeout=5
set default=0

insmod all_video
insmod gfxterm
insmod vbe

terminal_output gfxterm

menuentry "HamixOS v0.1.0" {
    insmod all_video
    set gfxpayload=1024x768x32,800x600x32,640x480x32
    multiboot2 /boot/kernel.bin
    boot
}

menuentry "HamixOS v0.1.0 (640x480 safe)" {
    insmod all_video
    set gfxpayload=640x480x32
    multiboot2 /boot/kernel.bin
    boot
}
